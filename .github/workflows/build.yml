name: Build and Release Resume

on:
  push:
    paths:
      - "**.tex"
      - "Tectonic.toml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Tectonic
        uses: wtfjoke/setup-tectonic@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Compile the whole Tectonic project and extract the output PDF
      - name: Compile LaTeX Project
        run: |
          tectonic -X build
          
          # Find the generated PDF inside the 'build/' folder and copy it to 'resume.pdf' 
          # so downstream steps (PNG conversion, Git commit, Release) can find it.
          cp $(find build -name "*.pdf" | head -n 1) resume.pdf

      - name: Generate Preview PNG
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ghostscript
          
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick/policy.xml || true

          convert -density 300 resume.pdf[0] -quality 100 resume.png
          convert resume.png -channel RGB -negate resume.png

      - name: Commit Generated Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add resume.pdf resume.png
          

          if ! git diff --cached --quiet; then
            git commit -m "Auto build resume [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Generate Version Tag
        id: tag
        run: |
          echo "tag=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Resume ${{ steps.tag.outputs.tag }}
          files: resume.pdf
